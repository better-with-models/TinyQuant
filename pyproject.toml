[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tinyquant"
version = "0.0.0"
description = "CPU-only vector quantization codec for embedding storage compression"
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = [
    "numpy>=1.26",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "hypothesis>=6.100",
    "mypy>=1.10",
    "ruff>=0.5",
    "twine>=5.0",
    "build>=1.0",
]
pgvector = [
    "psycopg[binary]>=3.1",
]

[tool.ruff]
target-version = "py312"
line-length = 88
extend-exclude = ["scripts"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "C901", "S", "SIM",
          "TCH", "ANN", "D", "RUF"]

[tool.ruff.lint.mccabe]
max-complexity = 7

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "TCH", "ANN401", "S608"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unreachable = true
no_implicit_reexport = true

[[tool.mypy.overrides]]
module = "psycopg.*"
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--import-mode=importlib -x --tb=short"
markers = [
    "pgvector: requires PostgreSQL with pgvector (PGVECTOR_TEST_DSN)",
]
