# cargo-audit configuration
#
# This file documents advisories that are knowingly ignored for the
# v1.1.0 release. Each entry has a tracking note and an exit plan.
# The supply-chain gate in `.github/workflows/rust-release.yml` runs
# `cargo audit` from `rust/`, which reads this file automatically.
# Unmaintained-crate warnings (RUSTSEC-…-yyyy advisories of kind
# `unmaintained`) are not denied at the workflow level — only true
# vulnerabilities are gating.

[advisories]
ignore = [
  # RUSTSEC-2025-0020: Risk of buffer overflow in PyString::from_object
  # in pyo3 < 0.24.1.
  #
  # We pin pyo3 = 0.22 in `rust/crates/tinyquant-py/Cargo.toml`. The
  # advisory's exploitable surface is the `PyString::from_object` call
  # path; we do not invoke that API directly. Upstream pyo3 0.22 is no
  # longer receiving patch backports, so the fix requires the 0.22 →
  # 0.24 upgrade, which carries breaking changes across the `Bound`
  # API and is scheduled for v1.2.0. Tracked as a follow-up; ignore
  # until that work lands and bump on the next release.
  "RUSTSEC-2025-0020",
]
