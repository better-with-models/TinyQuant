name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  FORCE_COLOR: "1"

# Runner selection policy
# -----------------------
# Internal (push to main, non-fork PRs): self-hosted ["self-hosted","docker-runner"]
# Fork PRs (from external contributors): GitHub-hosted ["ubuntu-latest"]
#
# GitHub's event-payload author_association is evaluated at webhook fire time
# and is unreliable for org-membership checks. The fork flag is authoritative:
# only org members can push to the repo directly; external contributors must
# fork first. The choose-runner job outputs a JSON runner label array that
# downstream jobs consume via fromJSON().

jobs:
  choose-runner:
    name: Choose Runner
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.pick.outputs.runner }}
    steps:
      - id: pick
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && \
                "${{ github.event.pull_request.head.repo.fork }}" == "true" ]]; then
            echo 'runner=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
          else
            echo 'runner=["self-hosted","docker-runner"]' >> "$GITHUB_OUTPUT"
          fi
      - run: echo "Selected runner=${{ steps.pick.outputs.runner }}"

  lint:
    name: Lint & Format
    runs-on: ${{ fromJSON(needs.choose-runner.outputs.runner) }}
    needs: [choose-runner]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Check bare suppressions
        run: |
          # Fail if any # noqa or # type: ignore lacks an explanation
          ! grep -rn '# noqa$' src/ tests/ || exit 1
          ! grep -rn '# type: ignore$' src/ tests/ || exit 1

  markdown-lint:
    name: Markdown Lint
    runs-on: ${{ fromJSON(needs.choose-runner.outputs.runner) }}
    needs: [choose-runner]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          # docs/ is the Obsidian vault and has its own maturity standard.
          # .github/ hosts the rich GitHub-flavored README (.github/README.md)
          # and GitHub-specific surfaces that intentionally use inline HTML
          # (<picture>, <details>, alert admonitions) — excluded here to
          # match scripts/verify_pre_commit.py which applies the same rule
          # locally.
          globs: |
            **/*.md
            !docs/**
            !.github/**

  typecheck:
    name: Type Check
    runs-on: ${{ fromJSON(needs.choose-runner.outputs.runner) }}
    needs: [choose-runner, lint]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - uses: actions/cache@v5
        with:
          path: .mypy_cache
          key: mypy-${{ hashFiles('pyproject.toml') }}-${{ github.sha }}
          restore-keys: mypy-${{ hashFiles('pyproject.toml') }}

      - name: mypy strict
        run: mypy --strict .

  test-pgvector:
    name: Integration – pgvector
    runs-on: ${{ fromJSON(needs.choose-runner.outputs.runner) }}
    needs: [choose-runner, typecheck]
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: tinyquant_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d tinyquant_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      PGVECTOR_TEST_DSN: "postgresql://test:test@localhost:5432/tinyquant_test"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev,pgvector]"

      - name: pgvector integration tests
        run: pytest tests/integration/test_pgvector.py -v -x --tb=short

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ${{ fromJSON(needs.choose-runner.outputs.runner) }}
    needs: [choose-runner, typecheck, markdown-lint]
    timeout-minutes: 60
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Unit tests
        run: pytest tests/codec/ tests/corpus/ tests/backend/ -x --tb=short

      - name: Architecture tests
        run: pytest tests/architecture/ -x --tb=short

      - name: Integration tests
        run: pytest tests/integration/ -x --tb=short

      - name: E2E tests
        run: pytest tests/e2e/ -x --tb=short

      - name: Coverage report
        run: |
          pytest --cov=tinyquant_cpu --cov-report=xml --cov-fail-under=90
          pytest --cov=tinyquant_cpu.codec --cov-report=term --cov-fail-under=94
          pytest --cov=tinyquant_cpu.corpus --cov-report=term --cov-fail-under=90

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  build-artifact:
    name: Build Package
    runs-on: ${{ fromJSON(needs.choose-runner.outputs.runner) }}
    needs: [choose-runner, test]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify distributions
        run: |
          pip install twine
          twine check dist/*

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
          retention-days: 30
