name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  FORCE_COLOR: "1"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Check bare suppressions
        run: |
          # Fail if any # noqa or # type: ignore lacks an explanation
          ! grep -rn '# noqa$' src/ tests/ || exit 1
          ! grep -rn '# type: ignore$' src/ tests/ || exit 1

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !docs/**

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - uses: actions/cache@v5
        with:
          path: .mypy_cache
          key: mypy-${{ hashFiles('pyproject.toml') }}-${{ github.sha }}
          restore-keys: mypy-${{ hashFiles('pyproject.toml') }}

      - name: mypy strict
        run: mypy --strict .

  test-pgvector:
    name: Integration – pgvector
    runs-on: ubuntu-latest
    needs: [typecheck]
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: tinyquant_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d tinyquant_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      PGVECTOR_TEST_DSN: "postgresql://test:test@localhost:5432/tinyquant_test"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev,pgvector]"

      - name: pgvector integration tests
        run: pytest tests/integration/test_pgvector.py -v -x --tb=short

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [typecheck, markdown-lint]
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Unit tests
        run: pytest tests/codec/ tests/corpus/ tests/backend/ -x --tb=short

      - name: Architecture tests
        run: pytest tests/architecture/ -x --tb=short

      - name: Integration tests
        run: pytest tests/integration/ -x --tb=short

      - name: E2E tests
        run: pytest tests/e2e/ -x --tb=short

      - name: Coverage report
        run: |
          pytest --cov=tinyquant --cov-report=xml --cov-fail-under=90
          pytest --cov=tinyquant.codec --cov-report=term --cov-fail-under=94
          pytest --cov=tinyquant.corpus --cov-report=term --cov-fail-under=90

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  build-artifact:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify distributions
        run: |
          pip install twine
          twine check dist/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30
