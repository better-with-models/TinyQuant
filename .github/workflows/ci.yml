name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  FORCE_COLOR: "1"

# Runner selection policy
# -----------------------
# Internal (push to main, non-fork PRs): self-hosted ["self-hosted","docker-runner"]
# Fork PRs (from external contributors): GitHub-hosted ["ubuntu-latest"]
#
# GitHub's event-payload author_association is evaluated at webhook fire time
# and is unreliable for org-membership checks. The fork flag is authoritative:
# only org members can push to the repo directly; external contributors must
# fork first. The choose-runner job outputs a JSON runner label array that
# downstream jobs consume via fromJSON().

jobs:
  choose-runner:
    name: Choose Runner
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.pick.outputs.runner }}
    steps:
      - id: pick
        # TEMP: self-hosted docker-runners offline; force GitHub-hosted until restored.
        run: |
          echo 'runner=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
      - run: echo "Selected runner=${{ steps.pick.outputs.runner }}"

  # TEMP: probe-self-hosted removed while docker-runners are offline.
  # Transitive skip propagation from `if: false` poisoned all downstream jobs.
  # Restore alongside the full runner-selection policy once runners come back.

  effective-runner:
    name: Effective Runner
    runs-on: ubuntu-latest
    needs: [choose-runner]
    outputs:
      runner: ${{ steps.resolve.outputs.runner }}
    steps:
      - id: resolve
        run: |
          echo 'runner=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"

  lint:
    name: Lint & Format
    runs-on: ${{ fromJSON(needs.effective-runner.outputs.runner) }}
    needs: [choose-runner, effective-runner]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Check bare suppressions
        run: |
          # Fail if any # noqa or # type: ignore lacks an explanation.
          # Phase 23: src/ no longer exists; the pure-Python reference
          # lives under tests/reference/.
          ! grep -rn '# noqa$' tests/ || exit 1
          ! grep -rn '# type: ignore$' tests/ || exit 1

  markdown-lint:
    name: Markdown Lint
    runs-on: ${{ fromJSON(needs.effective-runner.outputs.runner) }}
    needs: [choose-runner, effective-runner]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          # docs/ is the Obsidian vault and has its own maturity standard.
          # .github/ hosts the rich GitHub-flavored README (.github/README.md)
          # and GitHub-specific surfaces that intentionally use inline HTML
          # (<picture>, <details>, alert admonitions) — excluded here to
          # match scripts/verify_pre_commit.py which applies the same rule
          # locally.
          globs: |
            **/*.md
            !docs/**
            !.github/**

  typecheck:
    name: Type Check
    runs-on: ${{ fromJSON(needs.effective-runner.outputs.runner) }}
    needs: [effective-runner, lint]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy==1.26.* pytest==8.* pytest-cov==5.* hypothesis==6.* ruff==0.5.* mypy==1.10.*

      - uses: actions/cache@v5
        with:
          path: .mypy_cache
          key: mypy-${{ hashFiles('pyproject.toml') }}-${{ github.sha }}
          restore-keys: mypy-${{ hashFiles('pyproject.toml') }}

      - name: mypy strict
        run: mypy --strict .

  test-codec:
    name: "Test codec (Python ${{ matrix.python-version }})"
    runs-on: ${{ fromJSON(needs.effective-runner.outputs.runner) }}
    needs: [effective-runner, typecheck, markdown-lint]
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ matrix.python-version }}-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy==1.26.* pytest==8.* pytest-cov==5.* hypothesis==6.* ruff==0.5.* mypy==1.10.*
      - name: Run tests
        run: python -m coverage run --data-file=.coverage.codec.${{ matrix.python-version }} -m pytest tests/codec/ -x --tb=short
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        with:
          name: coverage-raw-codec-${{ matrix.python-version }}
          path: .coverage.codec.${{ matrix.python-version }}
          include-hidden-files: true
          retention-days: 1

  test-corpus:
    name: "Test corpus (Python ${{ matrix.python-version }})"
    runs-on: ${{ fromJSON(needs.effective-runner.outputs.runner) }}
    needs: [effective-runner, typecheck, markdown-lint]
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ matrix.python-version }}-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy==1.26.* pytest==8.* pytest-cov==5.* hypothesis==6.* ruff==0.5.* mypy==1.10.*
      - name: Run tests
        run: python -m coverage run --data-file=.coverage.corpus.${{ matrix.python-version }} -m pytest tests/corpus/ -x --tb=short
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        with:
          name: coverage-raw-corpus-${{ matrix.python-version }}
          path: .coverage.corpus.${{ matrix.python-version }}
          include-hidden-files: true
          retention-days: 1

  test-backend:
    name: "Test backend + smoke (Python ${{ matrix.python-version }})"
    runs-on: ${{ fromJSON(needs.effective-runner.outputs.runner) }}
    needs: [effective-runner, typecheck, markdown-lint]
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ matrix.python-version }}-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy==1.26.* pytest==8.* pytest-cov==5.* hypothesis==6.* ruff==0.5.* mypy==1.10.*
      - name: Run tests
        run: python -m coverage run --data-file=.coverage.backend.${{ matrix.python-version }} -m pytest tests/backend/ tests/test_smoke.py -x --tb=short
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        with:
          name: coverage-raw-backend-${{ matrix.python-version }}
          path: .coverage.backend.${{ matrix.python-version }}
          include-hidden-files: true
          retention-days: 1

  test-architecture:
    name: "Test architecture (Python ${{ matrix.python-version }})"
    runs-on: ${{ fromJSON(needs.effective-runner.outputs.runner) }}
    needs: [effective-runner, typecheck, markdown-lint]
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ matrix.python-version }}-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy==1.26.* pytest==8.* pytest-cov==5.* hypothesis==6.* ruff==0.5.* mypy==1.10.*
      - name: Run tests
        run: python -m coverage run --data-file=.coverage.arch.${{ matrix.python-version }} -m pytest tests/architecture/ -x --tb=short
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        with:
          name: coverage-raw-architecture-${{ matrix.python-version }}
          path: .coverage.arch.${{ matrix.python-version }}
          include-hidden-files: true
          retention-days: 1

  test-integration-local:
    name: "Test integration-local (Python ${{ matrix.python-version }})"
    runs-on: ${{ fromJSON(needs.effective-runner.outputs.runner) }}
    needs: [effective-runner, test-codec, test-corpus, test-backend, test-architecture]
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ matrix.python-version }}-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy==1.26.* pytest==8.* pytest-cov==5.* hypothesis==6.* ruff==0.5.* mypy==1.10.*
      - name: Run tests
        run: python -m coverage run --data-file=.coverage.intloc.${{ matrix.python-version }} -m pytest tests/integration/ --ignore=tests/integration/test_pgvector.py -x --tb=short
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        with:
          name: coverage-raw-intloc-${{ matrix.python-version }}
          path: .coverage.intloc.${{ matrix.python-version }}
          include-hidden-files: true
          retention-days: 1

  test-integration-pgvector:
    name: "Test integration-pgvector (Python ${{ matrix.python-version }})"
    runs-on: ${{ fromJSON(needs.effective-runner.outputs.runner) }}
    needs: [effective-runner, test-codec, test-corpus, test-backend, test-architecture]
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12", "3.13"]
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: tinyquant_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d tinyquant_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      PGVECTOR_TEST_DSN: "postgresql://test:test@localhost:5432/tinyquant_test"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ matrix.python-version }}-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy==1.26.* pytest==8.* pytest-cov==5.* hypothesis==6.* ruff==0.5.* mypy==1.10.* "psycopg[binary]>=3.1"
      - name: Run tests
        run: python -m coverage run --data-file=.coverage.intpg.${{ matrix.python-version }} -m pytest tests/integration/test_pgvector.py -x --tb=short
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        with:
          name: coverage-raw-intpg-${{ matrix.python-version }}
          path: .coverage.intpg.${{ matrix.python-version }}
          include-hidden-files: true
          retention-days: 1

  test-e2e:
    name: "Test e2e (Python ${{ matrix.python-version }})"
    runs-on: ${{ fromJSON(needs.effective-runner.outputs.runner) }}
    needs: [effective-runner, test-integration-local, test-integration-pgvector]
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ matrix.python-version }}-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy==1.26.* pytest==8.* pytest-cov==5.* hypothesis==6.* ruff==0.5.* mypy==1.10.*
      - name: Run tests
        run: python -m coverage run --data-file=.coverage.e2e.${{ matrix.python-version }} -m pytest tests/e2e/ -x --tb=short
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        with:
          name: coverage-raw-e2e-${{ matrix.python-version }}
          path: .coverage.e2e.${{ matrix.python-version }}
          include-hidden-files: true
          retention-days: 1

  # Phase 28.7: cross-impl parity tests need the Rust extension installed
  # so the canonical-rotation bridge in
  # `tests/reference/tinyquant_py_reference/codec/rotation_matrix.py`
  # actually executes. Run them under coverage so the bridge codepath
  # contributes to the codec subpackage gate.
  test-parity:
    name: "Test parity (Python ${{ matrix.python-version }})"
    runs-on: ${{ fromJSON(needs.effective-runner.outputs.runner) }}
    needs: [effective-runner, test-codec]
    timeout-minutes: 25
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
          key: parity-coverage-${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy==1.26.* pytest==8.* pytest-cov==5.* hypothesis==6.* maturin
      - name: Create venv (maturin >=1.13 requires one)
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
      - name: Reinstall test deps inside venv
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy==1.26.* pytest==8.* pytest-cov==5.* hypothesis==6.* coverage==7.* maturin
      - name: Build and install tinyquant_rs (maturin develop)
        working-directory: rust/crates/tinyquant-py
        run: maturin develop
      - name: Install tinyquant_cpu (Python reference shim)
        run: pip install -e .
      - name: Run parity tests under coverage
        run: python -m coverage run --data-file=.coverage.parity.${{ matrix.python-version }} -m pytest tests/parity/ -x --tb=short
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        with:
          name: coverage-raw-parity-${{ matrix.python-version }}
          path: .coverage.parity.${{ matrix.python-version }}
          include-hidden-files: true
          retention-days: 1

  coverage-combine:
    name: Coverage Combine & Gate
    runs-on: ${{ fromJSON(needs.effective-runner.outputs.runner) }}
    needs: [effective-runner, test-e2e, test-parity]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install coverage
        run: pip install coverage
      - name: Download all coverage artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: coverage-raw-*
          path: coverage_data/
          merge-multiple: true
      - name: Combine coverage
        run: python -m coverage combine coverage_data/
      - name: Coverage gate — global
        run: python -m coverage report --fail-under=90
      - name: Generate XML report
        run: python -m coverage xml
      - name: Coverage gate — codec
        run: python -m coverage report --include="*/tinyquant_py_reference/codec/*" --fail-under=94
      - name: Coverage gate — corpus
        run: python -m coverage report --include="*/tinyquant_py_reference/corpus/*" --fail-under=90
      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # Phase 23 dead-wheel guard.
  # Replaces the former `build-artifact` job: Phase 23 intentionally
  # produces NO wheel (the pure-Python reference lives under tests/
  # and is not a shipped artifact). Phase 24 will reintroduce a real
  # wheel build backed by the Rust core; this guard keeps the leakage
  # check in place across that transition.
  build-package-does-not-leak-reference:
    name: Wheel leakage guard
    needs: [effective-runner, coverage-combine]
    runs-on: ${{ fromJSON(needs.effective-runner.outputs.runner) }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tooling
        run: python -m pip install --upgrade build==1.* hatchling

      # Phase 23 contract: no reference-implementation files may be
      # shipped in any wheel built from this tree. With hatchling's
      # `packages = []` + `bypass-selection = true`, recent hatchling
      # versions build an empty metadata-only wheel rather than erroring
      # out; older versions fail the build entirely. Either behavior is
      # acceptable under Phase 23 — the hard contract is strictly that
      # nothing from `tests/reference/` or `tinyquant_py_reference/`
      # makes it into the archive. This guard is therefore phrased as a
      # leakage check that is meaningful through Phase 24 (when the
      # fat wheel legitimately starts carrying Rust-backed code but
      # still must never ship the pure-Python reference).
      - name: Build wheel (Phase 23 expects empty-or-failed build)
        id: build
        continue-on-error: true
        run: python -m build --wheel --outdir dist/

      - name: Inspect any wheel that was produced for reference leakage
        if: steps.build.outcome == 'success'
        run: |
          set -euo pipefail
          shopt -s nullglob
          produced=0
          for whl in dist/*.whl; do
            produced=1
            echo "=== Inspecting $whl ==="
            # `unzip -l` prints the wheel manifest. A leaked reference
            # would show as `tests/reference/...` or
            # `tinyquant_py_reference/...` inside the archive.
            if unzip -l "$whl" | grep -E '(^|/)(tests/reference|tinyquant_py_reference)(/|$)'; then
              echo "LEAK: wheel $whl contains reference-implementation files."
              exit 1
            fi
          done
          if [ "$produced" = "0" ]; then
            echo "No wheel produced — Phase 23 hard-fail contract held."
          else
            echo "Wheel produced but contains no reference-implementation files — Phase 23 leakage contract held."
          fi
