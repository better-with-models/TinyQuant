name: GPU runtime smoke

on:
  push:
    branches: [main]
    paths:
      - "rust/crates/tinyquant-gpu-wgpu/**"
      - ".github/workflows/gpu-ci.yml"
  # pull_request intentionally omitted: the GPU runner is self-hosted and has
  # no guaranteed availability.  timeout-minutes counts from run start, not
  # queue entry, so a queued job blocks PRs for up to GitHub's 24 h hard limit.
  # GPU smoke runs post-merge on main only.

permissions:
  contents: read

jobs:
  gpu-smoke:
    name: wgpu runtime smoke
    runs-on: [self-hosted, gpu]
    continue-on-error: true
    # timeout-minutes counts from run start (not queue entry), so it cannot
    # rescue a queued job from the 24 h hard limit.  This workflow is therefore
    # main-push only (no pull_request trigger).  continue-on-error keeps the
    # workflow green when the runner fleet is offline.
    timeout-minutes: 10
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.87.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Run parity tests (requires wgpu adapter)
        run: cargo test -p tinyquant-gpu-wgpu --test parity_compress
