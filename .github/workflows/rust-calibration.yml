name: rust-calibration

# On-demand calibration quality gates.
#
# These tests run the full LFS-backed fixture corpus (up to 10k×1536 vectors)
# which takes ~2–4 h per architecture group. They are NOT tied to PRs or main
# pushes — run them manually before a release or after a codec algorithm change.
#
# Trigger via the GitHub UI ("Run workflow") or gh CLI:
#   gh workflow run rust-calibration.yml \
#     [-f groups=all] [-f arch=x86_64] [-f ref=main]
#
# Inputs
# ------
# groups   Comma-separated subset to run, or "all".
#          Valid tokens: pr-speed, full-bw2, full-bw4, full-bw8,
#                        core-codebook, core-codec-parity
#          Default: "all"
#
# arch     Which architecture legs to run.
#          Options: "x86_64", "arm64", "both"
#          Default: "both"
#
# Note: the matrix is always expanded in full; the `groups` input is forwarded
# to the test filter so runners for skipped groups still start but exit fast.
# For a single group, use the `groups` input (e.g. "full-bw4").

on:
  workflow_dispatch:
    inputs:
      groups:
        description: >
          Test groups to run (comma-separated tokens or "all"):
          pr-speed, full-bw2, full-bw4, full-bw8, core-codebook, core-codec-parity
        required: false
        default: "all"
      arch:
        description: "Architecture legs: x86_64 | arm64 | both"
        required: false
        default: "both"
      ref:
        description: "Branch or SHA to run against (default: default branch)"
        required: false
        default: ""

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── x86_64 leg ────────────────────────────────────────────────────────────────
  calibration-x86:
    name: "Calibration (${{ matrix.group.name }}, x86_64)"
    # Skip the entire job matrix when the user asked for arm64-only.
    if: ${{ github.event.inputs.arch != 'arm64' }}
    runs-on: ["self-hosted", "docker-runner"]
    # Allow the workflow dispatch to complete even when the self-hosted
    # docker-runner fleet is offline.  Timeout counts from queue entry so
    # a missing runner fails quickly rather than hanging for 24 h.
    continue-on-error: true
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        group:
          # tinyquant-bench has no `std` feature (only `simd`); features field is "".
          # tinyquant-core needs --features std for the ignored integration tests.
          #
          # core-ignored is split into two explicit filters instead of a blank
          # filter, which would also run seed_42_dim_768_matches_frozen_snapshot
          # (deliberately #[ignore]d for ISA nondeterminism — see R19 in
          # docs/design/rust/risks-and-mitigations.md).
          - { name: "pr-speed",          filter: "pr_speed",             pkg: "-p tinyquant-bench", features: ""              }
          - { name: "full-bw2",          filter: "full_bw2",             pkg: "-p tinyquant-bench", features: ""              }
          - { name: "full-bw4",          filter: "full_bw4",             pkg: "-p tinyquant-bench", features: ""              }
          - { name: "full-bw8",          filter: "full_bw8",             pkg: "-p tinyquant-bench", features: ""              }
          - { name: "core-codebook",     filter: "train_matches_python", pkg: "-p tinyquant-core",  features: "--features std" }
          - { name: "core-codec-parity", filter: "codec",                pkg: "-p tinyquant-core",  features: "--features std" }
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Pull LFS objects
        run: git lfs pull
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: "Run calibration gates (${{ matrix.group.name }}, --release)"
        run: >-
          cargo test --release ${{ matrix.group.pkg }} ${{ matrix.group.features }}
          -- --ignored ${{ matrix.group.filter }}

  # ── arm64 leg ─────────────────────────────────────────────────────────────────
  calibration-arm64:
    name: "Calibration (${{ matrix.group.name }}, arm64)"
    # Skip the entire job matrix when the user asked for x86_64-only.
    if: ${{ github.event.inputs.arch != 'x86_64' }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        group:
          - { name: "pr-speed",          filter: "pr_speed",             pkg: "-p tinyquant-bench", features: ""              }
          - { name: "full-bw2",          filter: "full_bw2",             pkg: "-p tinyquant-bench", features: ""              }
          - { name: "full-bw4",          filter: "full_bw4",             pkg: "-p tinyquant-bench", features: ""              }
          - { name: "full-bw8",          filter: "full_bw8",             pkg: "-p tinyquant-bench", features: ""              }
          - { name: "core-codebook",     filter: "train_matches_python", pkg: "-p tinyquant-core",  features: "--features std" }
          - { name: "core-codec-parity", filter: "codec",                pkg: "-p tinyquant-core",  features: "--features std" }
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Pull LFS objects
        run: git lfs pull
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: "Run calibration gates (arm64, ${{ matrix.group.name }}, --release)"
        run: >-
          cargo test --release ${{ matrix.group.pkg }} ${{ matrix.group.features }}
          -- --ignored ${{ matrix.group.filter }}
