name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-tag:
    name: Verify Tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Extract and verify version
        id: check
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(grep -m1 -E '^version = "' pyproject.toml | sed -E 's/^version = "([^"]+)".*/\1/')
          INIT_VERSION=$(grep -m1 -E '^__version__ = "' src/tinyquant_cpu/__init__.py | sed -E 's/^__version__ = "([^"]+)".*/\1/')
          echo "Resolved versions: tag=[$TAG_VERSION] pyproject=[$PKG_VERSION] __init__=[$INIT_VERSION]"
          if [[ -z "$TAG_VERSION" ]]; then
            echo "::error::GITHUB_REF_NAME='${GITHUB_REF_NAME:-<unset>}' did not resolve to a non-empty tag version"
            exit 1
          fi
          if [[ -z "$PKG_VERSION" ]]; then
            echo "::error::Could not extract version from pyproject.toml"
            exit 1
          fi
          if [[ -z "$INIT_VERSION" ]]; then
            echo "::error::Could not extract __version__ from src/tinyquant_cpu/__init__.py"
            exit 1
          fi
          if [[ "$TAG_VERSION" != "$PKG_VERSION" ]]; then
            echo "::error::Tag v$TAG_VERSION does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi
          if [[ "$TAG_VERSION" != "$INIT_VERSION" ]]; then
            echo "::error::Tag v$TAG_VERSION does not match src/tinyquant_cpu/__init__.py __version__ $INIT_VERSION"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

  calibration-tests:
    name: Calibration Tests
    runs-on: ubuntu-latest
    needs: [verify-tag]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Score fidelity calibration
        run: pytest tests/calibration/test_score_fidelity.py -x --tb=long

      - name: Compression ratio calibration
        run: pytest tests/calibration/test_compression_ratio.py -x --tb=long

      - name: Determinism calibration
        run: pytest tests/calibration/test_determinism.py -x --tb=long

      - name: Research alignment
        run: pytest tests/calibration/test_research_alignment.py -x --tb=long

  build:
    name: Build Distributions
    runs-on: ubuntu-latest
    needs: [calibration-tests]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build

      - name: Verify distributions
        run: |
          pip install twine
          twine check dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [build]
    environment: testpypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify installation from TestPyPI (with retry)
        run: |
          for i in 1 2 3 4 5; do
            if pip install \
                --index-url https://test.pypi.org/simple/ \
                --extra-index-url https://pypi.org/simple/ \
                "tinyquant-cpu==${{ needs.verify-tag.outputs.version }}"; then
              break
            fi
            echo "TestPyPI index not ready yet, retry $i/5..."
            sleep 15
          done
          python -c "import tinyquant_cpu; print(tinyquant_cpu.__version__)"

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [publish-testpypi]
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [verify-tag, build]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [[ -n "$PREV_TAG" ]]; then
            NOTES=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG..HEAD")
          else
            NOTES=$(git log --pretty=format:"- %s (%h)")
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: |
            ## Changes

            ${{ steps.notes.outputs.notes }}

            ## Installation

            ```bash
            pip install tinyquant-cpu==${{ needs.verify-tag.outputs.version }}
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
