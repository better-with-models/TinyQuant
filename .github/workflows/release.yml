name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Runner selection policy
# -----------------------
# Release jobs run on GitHub-hosted ubuntu-22.04. The original posture
# was self-hosted `docker-runner`, but no such runner is currently
# registered against the repo (Settings → Actions → Runners shows zero
# self-hosted), so v1.1.0 publishes were stuck queued forever. Switching
# to GitHub-hosted is safe because:
#
#   - PyPI publishing uses pypa/gh-action-pypi-publish with OIDC
#     trusted publishing — there is no `PYPI_API_TOKEN` secret to leak
#     through the runner.
#   - The `pypi` and `testpypi` jobs each scope `environment:` to the
#     matching GitHub deployment environment, which carries its own
#     reviewer-approval gate before any publish step runs.
#   - Only org members can push `v*` tags (branch/tag protection on
#     main + rule that only releases/* and main can be tagged), so the
#     trigger surface itself is restricted.
#
# Re-evaluate when the docker-runner is brought back online: if it
# returns, swap these back to `docker-runner` for defense-in-depth.

jobs:
  verify-tag:
    name: Verify Tag
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Extract and verify version
        # `src/tinyquant_cpu/__init__.py` and the production fat-wheel
        # shim at `scripts/packaging/templates/__init__.py` both pull
        # `__version__` from the compiled Rust extension at runtime
        # (`__version__: str = _core.__version__`) — there is no static
        # string to grep for. The authoritative version is `pyproject.toml`,
        # which the maturin build flows through to `_core.__version__`
        # via `Cargo.toml workspace.package.version`. Cross-language
        # consistency is gated separately by
        # `scripts/check_version_consistency.sh` (Cargo workspace ↔
        # package.json).
        run: |
          set -exo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(sed -n 's/^version = "\([^"]*\)".*/\1/p' pyproject.toml | head -n1)
          echo "Resolved: tag=[$TAG_VERSION] pyproject=[$PKG_VERSION]"
          test -n "$TAG_VERSION" || { echo "::error::empty TAG_VERSION"; exit 1; }
          test "$TAG_VERSION" = "$PKG_VERSION" || { echo "::error::Tag v$TAG_VERSION != pyproject $PKG_VERSION"; exit 1; }

  calibration-tests:
    name: Calibration Tests
    runs-on: ubuntu-22.04
    needs: [verify-tag]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Score fidelity calibration
        run: pytest tests/calibration/test_score_fidelity.py -x --tb=long

      - name: Compression ratio calibration
        run: pytest tests/calibration/test_compression_ratio.py -x --tb=long

      - name: Determinism calibration
        run: pytest tests/calibration/test_determinism.py -x --tb=long

      - name: Research alignment
        run: pytest tests/calibration/test_research_alignment.py -x --tb=long

  build:
    name: Build Distributions
    runs-on: ubuntu-22.04
    needs: [calibration-tests]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build

      - name: Verify distributions
        run: |
          pip install twine
          twine check dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
          retention-days: 7
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-22.04
    needs: [build]
    environment: testpypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify installation from TestPyPI (with retry)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Verifying installation of tinyquant-cpu==$VERSION"
          for i in 1 2 3 4 5; do
            if pip install \
                --index-url https://test.pypi.org/simple/ \
                --extra-index-url https://pypi.org/simple/ \
                "tinyquant-cpu==$VERSION"; then
              break
            fi
            echo "TestPyPI index not ready yet, retry $i/5..."
            sleep 15
          done
          python -c "import tinyquant_cpu; print(tinyquant_cpu.__version__)"

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-22.04
    needs: [publish-testpypi]
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: [verify-tag, build]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate release notes file
        run: |
          set -eo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [[ -n "$PREV_TAG" ]]; then
            NOTES=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG..HEAD")
          else
            NOTES=$(git log --pretty=format:"- %s (%h)")
          fi
          {
            echo "## Changes"
            echo
            echo "$NOTES"
            echo
            echo "## Installation"
            echo
            echo '```bash'
            echo "pip install tinyquant-cpu==$VERSION"
            echo '```'
          } > release-notes.md
          echo "---release-notes.md---"
          cat release-notes.md

      - name: Download dist artifact
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Collect distribution files; fail loudly if the download step left
          # dist/ empty so we don't pass a literal "dist/*" to gh.
          shopt -s nullglob
          dist_files=(dist/*)
          shopt -u nullglob
          if (( ${#dist_files[@]} == 0 )); then
            echo "::error::No distribution files found in dist/"
            exit 1
          fi

          args=(
            "${GITHUB_REF_NAME}"
            --title "${GITHUB_REF_NAME}"
            --notes-file release-notes.md
          )
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            args+=(--prerelease)
          fi
          args+=("${dist_files[@]}")

          gh release create "${args[@]}"
