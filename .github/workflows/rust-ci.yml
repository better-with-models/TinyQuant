name: rust-ci

on:
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"
      - "docs/design/rust/**"
      - "docs/plans/rust/**"
  push:
    branches: [main]
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.78.0"
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-22.04
    needs: [fmt]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.78.0"
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features

  test:
    name: Test
    runs-on: ubuntu-22.04
    needs: [clippy]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.78.0"
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: test
        run: cargo test --workspace --all-features

  no-std-check:
    name: no_std cross-compile (thumbv7em-none-eabihf)
    runs-on: ubuntu-22.04
    needs: [clippy]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.78.0"
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: no_std build
        run: cargo build -p tinyquant-core --no-default-features --target thumbv7em-none-eabihf
