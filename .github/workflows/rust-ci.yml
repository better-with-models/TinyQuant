name: rust-ci

on:
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"
      - "docs/design/rust/**"
      - "docs/plans/rust/**"
  push:
    branches: [main]
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# Runner selection policy
# -----------------------
# Internal (push to main, non-fork PRs): self-hosted ["self-hosted","docker-runner"]
# Fork PRs (from external contributors): GitHub-hosted ["ubuntu-22.04"]
#
# ubuntu-22.04 is the external fallback to match the historically pinned
# toolchain environment for the Rust build.

jobs:
  choose-runner:
    name: Choose Runner
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.pick.outputs.runner }}
    steps:
      - id: pick
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && \
                "${{ github.event.pull_request.head.repo.fork }}" == "true" ]]; then
            echo 'runner=["ubuntu-22.04"]' >> "$GITHUB_OUTPUT"
          else
            echo 'runner=["self-hosted","docker-runner"]' >> "$GITHUB_OUTPUT"
          fi
      - run: echo "Selected runner=${{ steps.pick.outputs.runner }}"

  fmt:
    name: Format check
    runs-on: ${{ fromJSON(needs.choose-runner.outputs.runner) }}
    needs: [choose-runner]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.78.0"
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ${{ fromJSON(needs.choose-runner.outputs.runner) }}
    needs: [choose-runner, fmt]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.78.0"
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ${{ fromJSON(needs.choose-runner.outputs.runner) }}
    needs: [choose-runner, clippy]
    defaults:
      run:
        working-directory: rust
    # Intentionally NO `RAYON_NUM_THREADS` override here. The first
    # Phase 14 attempt pinned it to `"1"` hoping to serialize faer's
    # QR reduction order, but a subsequent docs-only PR proved that
    # single-threading is insufficient: GitHub Actions' ubuntu-22.04
    # runner pool provisions across host CPUs with different SIMD
    # ISAs (AVX2 vs AVX-512), and pulp/faer pick different kernels
    # at runtime for the same `dim=768` matrix, producing different
    # f64 bit patterns even serially. The proper fix belongs inside
    # `RotationMatrix::build` — see R19 in
    # `docs/design/rust/risks-and-mitigations.md`. Until that lands,
    # the `dim=768` bit-exact fixture parity test is `#[ignore]`d
    # and replaced with an orthogonality check.
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.78.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: test
        run: cargo test --workspace --all-features

  no-std-check:
    name: no_std cross-compile (thumbv7em-none-eabihf)
    runs-on: ${{ fromJSON(needs.choose-runner.outputs.runner) }}
    needs: [choose-runner, clippy]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.78.0"
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: no_std build
        run: cargo build -p tinyquant-core --no-default-features --target thumbv7em-none-eabihf
