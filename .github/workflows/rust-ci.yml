name: rust-ci

on:
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"
      - "docs/design/rust/**"
      - "docs/plans/rust/**"
  push:
    branches: [main]
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# Runner selection policy
# -----------------------
# Internal (push to main, PRs from org members/collaborators): self-hosted docker-runner
# External PRs (CONTRIBUTOR / FIRST_TIME_CONTRIBUTOR / NONE): ubuntu-22.04 (GitHub-hosted)
#
# Expression: use docker-runner unless this is a PR from an untrusted author.
# ubuntu-22.04 is used as the external fallback (not ubuntu-latest) to match
# the historically pinned toolchain environment for the Rust build.

jobs:
  fmt:
    name: Format check
    runs-on: ${{ (github.event_name != 'pull_request' || contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)) && 'docker-runner' || 'ubuntu-22.04' }}
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.78.0"
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ${{ (github.event_name != 'pull_request' || contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)) && 'docker-runner' || 'ubuntu-22.04' }}
    needs: [fmt]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.78.0"
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ${{ (github.event_name != 'pull_request' || contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)) && 'docker-runner' || 'ubuntu-22.04' }}
    needs: [clippy]
    defaults:
      run:
        working-directory: rust
    # Intentionally NO `RAYON_NUM_THREADS` override here. The first
    # Phase 14 attempt pinned it to `"1"` hoping to serialize faer's
    # QR reduction order, but a subsequent docs-only PR proved that
    # single-threading is insufficient: GitHub Actions' ubuntu-22.04
    # runner pool provisions across host CPUs with different SIMD
    # ISAs (AVX2 vs AVX-512), and pulp/faer pick different kernels
    # at runtime for the same `dim=768` matrix, producing different
    # f64 bit patterns even serially. The proper fix belongs inside
    # `RotationMatrix::build` — see R19 in
    # `docs/design/rust/risks-and-mitigations.md`. Until that lands,
    # the `dim=768` bit-exact fixture parity test is `#[ignore]`d
    # and replaced with an orthogonality check.
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.78.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: test
        run: cargo test --workspace --all-features

  no-std-check:
    name: no_std cross-compile (thumbv7em-none-eabihf)
    runs-on: ${{ (github.event_name != 'pull_request' || contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)) && 'docker-runner' || 'ubuntu-22.04' }}
    needs: [clippy]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.78.0"
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: no_std build
        run: cargo build -p tinyquant-core --no-default-features --target thumbv7em-none-eabihf
