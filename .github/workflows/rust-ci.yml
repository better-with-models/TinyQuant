name: rust-ci

on:
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"
      - "docs/design/rust/**"
      - "docs/plans/rust/**"
  push:
    branches: [main]
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.78.0"
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-22.04
    needs: [fmt]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.78.0"
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-22.04
    needs: [clippy]
    defaults:
      run:
        working-directory: rust
    # Intentionally NO `RAYON_NUM_THREADS` override here. The first
    # Phase 14 attempt pinned it to `"1"` hoping to serialize faer's
    # QR reduction order, but a subsequent docs-only PR proved that
    # single-threading is insufficient: GitHub Actions' ubuntu-22.04
    # runner pool provisions across host CPUs with different SIMD
    # ISAs (AVX2 vs AVX-512), and pulp/faer pick different kernels
    # at runtime for the same `dim=768` matrix, producing different
    # f64 bit patterns even serially. The proper fix belongs inside
    # `RotationMatrix::build` — see R19 in
    # `docs/design/rust/risks-and-mitigations.md`. Until that lands,
    # the `dim=768` bit-exact fixture parity test is `#[ignore]`d
    # and replaced with an orthogonality check.
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.78.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: test
        run: cargo test --workspace --all-features

  no-std-check:
    name: no_std cross-compile (thumbv7em-none-eabihf)
    runs-on: ubuntu-22.04
    needs: [clippy]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.78.0"
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: no_std build
        run: cargo build -p tinyquant-core --no-default-features --target thumbv7em-none-eabihf

  test-mmap:
    name: Test (mmap feature)
    runs-on: ubuntu-22.04
    needs: [clippy]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: test-mmap
        run: cargo test -p tinyquant-io --features "mmap"

  test-mmap-dhat:
    name: Test (mmap + dhat-heap, single-threaded)
    runs-on: ubuntu-22.04
    needs: [clippy]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: test-mmap-dhat
        run: cargo test -p tinyquant-io --features "mmap dhat-heap" --test zero_copy -- --test-threads=1

  test-mmap-windows:
    name: Test (mmap, Windows)
    runs-on: windows-2022
    needs: [clippy]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: test-mmap-windows
        run: cargo test -p tinyquant-io --features "mmap" --test mmap_corpus

  fixture-drift:
    name: Fixture drift check
    runs-on: ubuntu-22.04
    needs: [test-mmap]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: fixture-drift
        run: git diff --exit-code crates/tinyquant-io/tests/fixtures/codec_file/
