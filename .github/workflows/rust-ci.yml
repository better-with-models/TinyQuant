name: rust-ci

on:
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"
      - "docs/design/rust/**"
      - "docs/plans/rust/**"
  push:
    branches: [main]
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# Runner selection policy
# -----------------------
# Internal (push to main, non-fork PRs): self-hosted ["self-hosted","docker-runner"]
# Fork PRs (from external contributors): GitHub-hosted ["ubuntu-22.04"]
#
# ubuntu-22.04 is the external fallback to match the historically pinned
# toolchain environment for the Rust build.

jobs:
  choose-runner:
    name: Choose Runner
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.pick.outputs.runner }}
    steps:
      - id: pick
        # TEMP: self-hosted docker-runners offline; force GitHub-hosted until restored.
        run: |
          echo 'runner=["ubuntu-22.04"]' >> "$GITHUB_OUTPUT"
      - run: echo "Selected runner=${{ steps.pick.outputs.runner }}"

  fmt:
    name: Format check
    runs-on: ${{ fromJSON(needs.choose-runner.outputs.runner) }}
    needs: [choose-runner]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81.0"
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ${{ fromJSON(needs.choose-runner.outputs.runner) }}
    needs: [choose-runner, fmt]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81.0"
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: clippy
        # --all-features is intentionally NOT used here because
        # tinyquant-pgvector's `live-db` feature activates `postgres 0.19`
        # which transitively requires getrandom 0.4 (edition2024, Rust > 1.81).
        # The live-db / test-containers features are tested separately in
        # environments with Docker and a live PostgreSQL server.
        # tinyquant-gpu-wgpu requires rust-version = "1.87" and is excluded from
        # the 1.81 MSRV gate. It is linted separately in the gpu-compile job.
        run: cargo clippy --workspace --exclude tinyquant-gpu-wgpu --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ${{ fromJSON(needs.choose-runner.outputs.runner) }}
    needs: [choose-runner, clippy]
    defaults:
      run:
        working-directory: rust
    # Intentionally NO `RAYON_NUM_THREADS` override here. The first
    # Phase 14 attempt pinned it to `"1"` hoping to serialize faer's
    # QR reduction order, but a subsequent docs-only PR proved that
    # single-threading is insufficient: GitHub Actions' ubuntu-22.04
    # runner pool provisions across host CPUs with different SIMD
    # ISAs (AVX2 vs AVX-512), and pulp/faer pick different kernels
    # at runtime for the same `dim=768` matrix, producing different
    # f64 bit patterns even serially. The proper fix belongs inside
    # `RotationMatrix::build` — see R19 in
    # `docs/design/rust/risks-and-mitigations.md`. Until that lands,
    # the `dim=768` bit-exact fixture parity test is `#[ignore]`d
    # and replaced with an orthogonality check.
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - name: Pull LFS objects
        run: git lfs pull
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Verify tinyquant-core has no GPU dependencies
        # GAP-GPU-001: tinyquant-core must never pull in GPU crates.
        # Anchored to full crate names to avoid false positives from
        # crate names that merely contain the letters "gpu".
        run: |
          OUTPUT=$(cargo tree -p tinyquant-core --no-default-features 2>&1)
          if echo "$OUTPUT" | grep -qE '\bwgpu\b|\bcust\b|\btinyquant-gpu\b'; then
            echo "FAIL: GPU dependency found in tinyquant-core dep tree:"
            echo "$OUTPUT" | grep -E '\bwgpu\b|\bcust\b|\btinyquant-gpu\b'
            exit 1
          fi
          echo "PASS: tinyquant-core dep tree is GPU-free"
      - name: test
        # --all-features omitted: tinyquant-pgvector's live-db feature activates
        # postgres 0.19 which requires getrandom 0.4 (edition2024, Rust > 1.81).
        # tinyquant-gpu-wgpu requires rust-version = "1.87" and is tested in the
        # gpu-compile job.
        run: cargo test --workspace --exclude tinyquant-gpu-wgpu
      - name: test (bruteforce)
        run: cargo test -p tinyquant-bruteforce

  no-std-check:
    name: no_std cross-compile (thumbv7em-none-eabihf)
    runs-on: ${{ fromJSON(needs.choose-runner.outputs.runner) }}
    needs: [choose-runner, clippy]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81.0"
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: no_std build
        run: cargo build -p tinyquant-core --no-default-features --target thumbv7em-none-eabihf

  test-mmap:
    name: Test (mmap feature)
    runs-on: ubuntu-22.04
    needs: [clippy]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: test-mmap
        run: cargo test -p tinyquant-io --features "mmap"

  test-mmap-dhat:
    name: Test (mmap + dhat-heap, single-threaded)
    runs-on: ubuntu-22.04
    needs: [clippy]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: test-mmap-dhat
        run: cargo test -p tinyquant-io --features "mmap dhat-heap" --test zero_copy -- --test-threads=1

  test-mmap-windows:
    name: Test (mmap, Windows)
    runs-on: windows-2022
    needs: [clippy]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: test-mmap-windows
        run: cargo test -p tinyquant-io --features "mmap" --test mmap_corpus

  fixture-drift:
    name: Fixture drift check
    runs-on: ubuntu-22.04
    needs: [test-mmap]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - name: fixture-drift
        run: git diff --exit-code crates/tinyquant-io/tests/fixtures/codec_file/

  simd-scalar:
    name: SIMD parity (scalar, feature=simd)
    runs-on: ubuntu-22.04
    needs: [clippy]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: test (simd=on, no extra target-feature)
        run: cargo test -p tinyquant-core --features simd

  simd-avx2:
    name: SIMD parity (AVX2+FMA, x86_64)
    runs-on: ubuntu-22.04
    needs: [clippy]
    defaults:
      run:
        working-directory: rust
    env:
      RUSTFLAGS: "-C target-feature=+avx2,+fma -D warnings"
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: test (simd=on, +avx2,+fma)
        run: cargo test -p tinyquant-core --features simd
      - name: test bruteforce (simd=on, +avx2,+fma)
        run: cargo test -p tinyquant-bruteforce --features simd

  simd-neon:
    name: SIMD parity (NEON, aarch64)
    runs-on: ubuntu-22.04-arm
    needs: [clippy]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: test (simd=on, aarch64 NEON)
        run: cargo test -p tinyquant-core --features simd
      - name: test bruteforce (simd=on, aarch64 NEON)
        run: cargo test -p tinyquant-bruteforce --features simd

  simd-neon-darwin:
    name: SIMD parity (NEON, aarch64 macOS)
    runs-on: macos-14
    needs: [clippy]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: test (simd=on, NEON, macOS aarch64)
        run: cargo test -p tinyquant-core --features simd

  simd-avx2-windows:
    name: SIMD parity (AVX2+FMA, Windows x86_64)
    runs-on: windows-2022
    needs: [clippy]
    defaults:
      run:
        working-directory: rust
    env:
      RUSTFLAGS: "-C target-feature=+avx2,+fma -D warnings"
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: test (simd=on, +avx2,+fma, Windows)
        run: cargo test -p tinyquant-core --features simd

  miri-scalar:
    name: Miri (scalar, tinyquant-core)
    runs-on: ubuntu-22.04
    needs: [clippy]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: miri
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      # Scope Miri to `--lib` (unit tests in source files only).
      # Integration tests under `tests/` are excluded for two reasons:
      #   1. They load fixture files via `fs::read` which Miri's isolation
      #      mode blocks; adding -Zmiri-disable-isolation would work but
      #      then codebook.rs alone takes ~12 min under Miri's interpreter.
      #   2. Total execution time would exceed CI job limits.
      # Unit tests verify memory safety of the scalar kernels and dispatch
      # scaffolding — the core intent of this job per the Phase 20 plan.
      - name: miri test (unit tests, scalar)
        run: cargo +nightly miri test -p tinyquant-core --lib
      - name: miri test (unit tests, simd dispatch layer)
        run: cargo +nightly miri test -p tinyquant-core --lib --features simd

  simd-audit:
    name: SIMD CI matrix audit (xtask)
    runs-on: ubuntu-22.04
    needs: [clippy]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: cargo xtask simd audit
        run: cargo run -p xtask -- simd audit

  # NOTE: Phase 26 promoted the five PR-speed calibration gates from
  # `#[ignore]` to always-on. They run inside `cargo test --workspace` in the
  # `test` job above (LFS fixtures are fetched by `git lfs pull`).
  # Full-corpus gates (openai_10k_d1536) remain `#[ignore]` and are intended
  # for a separate `rust-ci/calibration` job to be added in Phase 28.

  # ── Phase 21: Benchmark budget gate ──────────────────────────────────────────
  #
  # Validates the committed `baselines/main.json` matches the schema.
  # The full `--check-against main` run is advisory on PRs (it needs a
  # stable CI runner to produce reliable medians — R21.8).
  #
  # Triggers: PRs and main pushes touching Rust bench or core sources.
  bench-budget:
    name: Benchmark budget validation
    runs-on: ${{ fromJSON(needs.choose-runner.outputs.runner) }}
    needs: [choose-runner, test]
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Validate baseline schema
        run: cargo run -p xtask -- bench --validate
      - name: Validate calibration results schema
        run: cargo run -p xtask -- calibration --validate
      - name: CI parity check (docs vs rust-ci.yml)
        run: cargo run -p xtask -- docs check-ci-parity
      - name: Check benchmark budget against baseline
        if: github.ref == 'refs/heads/main'
        working-directory: rust
        run: |
          if [ -f crates/tinyquant-bench/baselines/main.json ]; then
            cargo run -p xtask -- bench --check-against main
          else
            echo "No committed baseline found; skipping budget check."
            echo "Run 'cargo xtask bench --capture-baseline main' on a CI runner to establish one."
          fi

  gpu-compile:
    name: GPU crate — compile + shader validation
    runs-on: ubuntu-22.04
    # RUSTUP_TOOLCHAIN overrides rust-toolchain.toml (which pins 1.81) so that
    # cargo uses the 1.87 toolchain installed by dtolnay/rust-toolchain below.
    env:
      RUSTUP_TOOLCHAIN: "1.87.0"
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.87.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: build GPU crate
        run: cargo build -p tinyquant-gpu-wgpu
      - name: shader validation (adapter-less)
        run: cargo test -p tinyquant-gpu-wgpu --test context_probe all_shaders_compile_without_device
      - name: clippy GPU crate
        # --no-deps: pre-existing tinyquant-core lints fail at 1.87 clippy;
        # those are tracked separately in the 1.81 clippy job.
        run: cargo clippy --no-deps -p tinyquant-gpu-wgpu -- -D warnings

  gpu-feature-gate:
    name: build + test (tinyquant-core gpu-wgpu feature)
    runs-on: ubuntu-22.04
    # This job is independent of the runner-selection matrix because it always
    # runs on a fixed GitHub-hosted image (needs mesa software renderer).
    env:
      RUSTUP_TOOLCHAIN: "1.87.0"
      # Force wgpu to use the OpenGL software renderer available in mesa.
      WGPU_BACKEND: "gl"
      MESA_NO_ERROR: "1"
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.87.0"
          components: clippy
      - name: install mesa EGL (software renderer)
        run: sudo apt-get update -q && sudo apt-get install -y libegl1-mesa-dev libgl1-mesa-dri
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
          key: gpu-feature-gate-1.87
      - name: build tinyquant-core with gpu-wgpu feature
        run: cargo build -p tinyquant-core --features gpu-wgpu
      - name: test tinyquant-core with gpu-wgpu feature (software renderer)
        run: cargo test -p tinyquant-core --features gpu-wgpu
      - name: clippy tinyquant-core with gpu-wgpu feature
        run: cargo clippy --no-deps -p tinyquant-core --features gpu-wgpu -- -D warnings
      - name: clippy tinyquant-core without gpu-wgpu feature
        run: cargo clippy --no-deps -p tinyquant-core -- -D warnings
      - name: verify no_std still compiles without gpu-wgpu
        run: |
          rustup target add thumbv7em-none-eabihf
          cargo build -p tinyquant-core --no-default-features --target thumbv7em-none-eabihf

  python-pyo3-parity:
    name: Python PyO3 parity (tinyquant_rs vs tinyquant_cpu)
    runs-on: ubuntu-22.04
    needs: [clippy]
    # Independent of runner selection — always use GitHub-hosted.
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
          key: python-pyo3-1.81
      - name: Install maturin and build deps
        run: pip install maturin numpy pytest
      - name: Build and install tinyquant_rs (maturin develop)
        working-directory: rust/crates/tinyquant-py
        run: maturin develop
      - name: Install tinyquant_cpu (Python reference)
        run: pip install -e .
      - name: Run parity tests
        run: pytest rust/crates/tinyquant-py/tests/python/test_parity.py -v
