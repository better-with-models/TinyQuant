name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: 'Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: 'Bug Fixes'
    labels:
      - 'bug'
      - 'fix'
  - title: 'Maintenance'
    labels:
      - 'chore'
      - 'maintenance'
      - 'dependencies'

autolabeler:
  - label: 'feature'
    branch:
      - '/^feat\//'
  - label: 'fix'
    branch:
      - '/^fix\//'
  - label: 'chore'
    branch:
      - '/^chore\//'
  - label: 'maintenance'
    branch:
      - '/^maint\//'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

template: |
  ## Changes

  $CHANGES

  See [CHANGELOG.md](CHANGELOG.md) for details.
